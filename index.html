<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>에스원 윤리·감사 제보 채널 / S-1 Ethics Report</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg1:#eaf0f8; --bg2:#f6f9fd;
    --panel:#ffffff; --bot:#eef2f8; --botTxt:#1a2332;
    --user:#1b50a0; --userTxt:#ffffff;
    --txt:#16202e; --muted:#4a5666; --faint:#64748b;
    --accent:#1b50a0; --accentDark:#153f80; --accentTint:rgba(27,80,160,.08);
    --line:#e2e8f0; --ok:#16a34a; --warn:#d97706;
    --focus:#2563eb;
    --shadow:0 16px 44px rgba(27,80,160,.16);
    --radius:20px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg1:#0d1526; --bg2:#101a30;
      --panel:#151f33; --bot:#1e2a42; --botTxt:#e6ecf5;
      --user:#3b82f6; --userTxt:#ffffff;
      --txt:#e6ecf5; --muted:#a9b6c8; --faint:#8494a8;
      --accent:#5b9bf0; --accentDark:#4a86d8; --accentTint:rgba(91,155,240,.14);
      --line:#2a3752; --focus:#8ab4ff;
      --shadow:0 16px 44px rgba(0,0,0,.5);
    }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Microsoft YaHei",sans-serif;
       background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--txt);
       min-height:100dvh;display:flex;justify-content:center;align-items:center;
       padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom))}
  .app{width:100%;max-width:480px;height:90dvh;max-height:800px;background:var(--panel);
       border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;
       overflow:hidden;box-shadow:var(--shadow);position:relative}

  /* ---- Header ---- */
  header{padding:14px 18px;border-bottom:1px solid var(--line);background:var(--accentTint)}
  .htop{display:flex;align-items:center;gap:12px}
  .logo{height:38px;padding:0 12px;border-radius:8px;background:var(--panel);border:2px solid var(--accent);
        display:flex;align-items:center;justify-content:center;flex-shrink:0;
        font-weight:800;font-size:18px;color:var(--accent);letter-spacing:.5px}
  header h1{font-size:16px;margin:0;font-weight:800;color:var(--txt)}
  header p{margin:2px 0 0;font-size:12.5px;color:var(--muted)}
  .badge{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);
         border:1px solid var(--accent);padding:4px 9px;border-radius:20px;background:var(--accentTint);
         white-space:nowrap;font-weight:600}
  .langbar{display:flex;gap:6px;margin-top:12px}
  .lang{font-size:12px;padding:5px 11px;border-radius:14px;border:1px solid var(--line);
        background:transparent;color:var(--muted);cursor:pointer;transition:.15s;font-family:inherit}
  .lang:hover{border-color:var(--accent);color:var(--accent)}
  .lang.active{border-color:var(--accent);color:#fff;background:var(--accent);font-weight:700}

  /* ---- Progress ---- */
  .progress{height:4px;background:var(--line);flex-shrink:0}
  .progress .fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accentDark));
                  transition:width .45s cubic-bezier(.4,0,.2,1)}

  /* ---- Intro / landing ---- */
  .intro{position:absolute;inset:0;background:var(--panel);z-index:20;display:flex;flex-direction:column;
         justify-content:center;padding:34px 28px calc(28px + env(safe-area-inset-bottom));gap:18px;
         animation:fade .3s ease;overflow-y:auto}
  .intro .shield{width:60px;height:60px;color:var(--accent);flex-shrink:0}
  .intro h2{margin:0;font-size:23px;font-weight:800;line-height:1.3;color:var(--txt)}
  .intro .lead{margin:0;font-size:14.5px;color:var(--muted);line-height:1.55}
  .intro ul{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column;gap:12px}
  .intro li{display:flex;gap:10px;align-items:flex-start;font-size:14px;color:var(--txt);line-height:1.5}
  .intro li span{white-space:pre-line}
  .intro li svg{width:20px;height:20px;flex-shrink:0;color:var(--ok);margin-top:1px}
  .startBtn{margin-top:8px;background:var(--accent);color:#fff;border:none;border-radius:14px;
            padding:15px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
  .startBtn:hover{background:var(--accentDark)}
  .startBtn.secondary{background:transparent;color:var(--accent);border:1.5px solid var(--accent);margin-top:0}
  .startBtn.secondary:hover{background:var(--accentTint);color:var(--accent)}
  .intro .law{font-size:11.5px;color:var(--faint);text-align:center;line-height:1.5;margin:0;white-space:pre-line}

  /* ---- Chat ---- */
  .chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
  .row{display:flex;gap:8px;align-items:flex-end;animation:fade .25s ease}
  .row.user{flex-direction:row-reverse}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;
      justify-content:center;background:var(--bot);color:var(--accent)}
  .av svg{width:17px;height:17px}
  .row.user .av{background:var(--user);color:#fff}
  .bubble{max-width:78%;padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.55;
          background:var(--bot);color:var(--botTxt);border-bottom-left-radius:4px;
          white-space:pre-wrap;word-break:break-word}
  .row.user .bubble{background:var(--user);color:var(--userTxt);border-bottom-right-radius:4px;border-bottom-left-radius:16px}

  /* typing indicator */
  .bubble.typing{display:inline-flex;gap:5px;align-items:center;padding:14px}
  .bubble.typing span{width:7px;height:7px;border-radius:50%;background:var(--faint);opacity:.5;
                      animation:blink 1.2s infinite ease-in-out}
  .bubble.typing span:nth-child(2){animation-delay:.2s}
  .bubble.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

  /* sending spinner */
  .sending{display:inline-flex;align-items:center;gap:9px}
  .spinner{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);
           border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- Options / quick replies ---- */
  .opts{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 8px;justify-content:flex-start}
  .opt{background:transparent;border:1.5px solid var(--accent);color:var(--accent);
       padding:9px 15px;border-radius:20px;font-size:13.5px;cursor:pointer;transition:.15s;font-family:inherit}
  .opt:hover{background:var(--accent);color:#fff}
  .opt.primary{background:var(--accent);color:#fff}
  .opt.primary:hover{background:var(--accentDark)}

  /* ---- Attachment chips ---- */
  .chips{display:flex;flex-wrap:wrap;gap:7px;width:100%;margin-bottom:2px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--bot);color:var(--botTxt);
        border:1px solid var(--line);border-radius:10px;padding:6px 8px 6px 10px;font-size:12.5px;max-width:100%}
  .chip .nm{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip .sz{color:var(--faint);font-size:11px}
  .chip .x{background:transparent;border:none;color:var(--faint);cursor:pointer;font-size:16px;
           line-height:1;padding:0 2px;border-radius:6px;font-family:inherit}
  .chip .x:hover{color:var(--warn)}

  /* ---- Reassurance bar ---- */
  .reassure{display:flex;align-items:center;gap:6px;justify-content:center;font-size:11.5px;
            color:var(--muted);padding:6px 12px;border-top:1px solid var(--line);background:var(--accentTint)}
  .reassure svg{width:13px;height:13px;color:var(--accent);flex-shrink:0}

  /* ---- Input bar ---- */
  .inputbar{display:flex;gap:8px;padding:12px;background:var(--panel);align-items:flex-end}
  .back{background:transparent;border:none;padding:0;width:40px;height:44px;cursor:pointer;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;color:var(--accent);border-radius:12px}
  .back:hover{background:var(--accentTint)}
  .inputbar textarea{flex:1;resize:none;background:var(--bot);border:1.5px solid var(--line);
       color:var(--txt);border-radius:12px;padding:11px 12px;font-size:14.5px;font-family:inherit;
       height:44px;max-height:120px;line-height:1.4}
  .inputbar textarea::placeholder{color:var(--faint)}
  .inputbar textarea:focus{outline:none;border-color:var(--accent)}
  .send{background:var(--accent);border:none;color:#fff;border-radius:12px;width:48px;height:44px;
        cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .send:hover{background:var(--accentDark)}
  .send:disabled{opacity:.4;cursor:not-allowed}

  /* ---- Footer ---- */
  .footnote{font-size:10.5px;color:var(--faint);text-align:center;
            padding:7px 14px calc(9px + env(safe-area-inset-bottom));
            line-height:1.45;background:var(--panel);border-top:1px solid var(--line)}

  /* ---- Summary card ---- */
  .summary{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13px}
  .summary h4{margin:0 0 10px;color:var(--accent);font-size:13px}
  .summary table{width:100%;border-collapse:collapse}
  .summary td{padding:6px 4px;border-bottom:1px solid var(--line);vertical-align:top}
  .summary td.k{color:var(--muted);width:36%;white-space:nowrap}

  /* ---- Focus visibility (a11y) ---- */
  :focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px}

  /* ---- Reduced motion ---- */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s !important;transition-duration:.001s !important}
    .chat{scroll-behavior:auto}
  }

  /* ---- Mobile: full-screen ---- */
  @media (max-width:520px){
    body{padding:0}
    .app{max-width:none;height:100dvh;max-height:none;border:none;border-radius:0}
  }
</style>
</head>

  </div>
  <div class="footnote" id="hFoot"></div>
</div>

const LANG_ORDER = ["ko","en","zh","vi"];
/* ====================================================================== */

const chat=document.getElementById('chat'), optsEl=document.getElementById('opts');
const textEl=document.getElementById('text'), sendBtn=document.getElementById('send');
const backBtn=document.getElementById('back'), progressFill=document.getElementById('progressFill');
const introEl=document.getElementById('intro'), startBtn=document.getElementById('startBtn'), askBtn=document.getElementById('askBtn');
const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let lang="ko", T=LANG.ko;
const data={anonIdx:-1, categoryIdx:-1, evidenceIdx:-1, when:"", dept:"", who:"", detail:"", name:"", contact:"", files:[]};
let step=0, pending=null, minLen=1, stepHistory=[], finished=false, started=false, mode="report";

const BOT_AV='<div class="av"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="8" r="4.2"/><path d="M3.6 20.6c0-4.7 3.8-8.2 8.4-8.2s8.4 3.5 8.4 8.2z"/></svg></div>';
const USER_AV=BOT_AV;

function applyChrome(){
  document.documentElement.lang = lang;
  document.getElementById('hTitle').textContent=T.title;
  document.getElementById('hSub').textContent=T.sub;
  document.getElementById('hBadgeTxt').textContent=T.badge;
  document.getElementById('hFoot').textContent=T.foot;
  document.getElementById('reassureTxt').textContent=T.reassure;
  document.getElementById('introTitle').textContent=T.introTitle;
  const leadEl=document.getElementById('introLead');
  leadEl.textContent=T.introLead; leadEl.style.display=T.introLead?'':'none';
  document.getElementById('introLaw').textContent=T.introLaw;
  startBtn.textContent=T.startBtn;
  askBtn.textContent=T.askBtn;
  sendBtn.setAttribute('aria-label',T.sendAria);
  backBtn.setAttribute('aria-label',T.backAria);
  const ul=document.getElementById('introPoints'); ul.innerHTML='';
  T.introPoints.forEach(p=>{
    const li=document.createElement('li');
    li.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg><span></span>';
    li.querySelector('span').textContent=p;
    ul.appendChild(li);
  });
}
function buildLangBar(){
  const bar=document.getElementById('langbar'); bar.innerHTML='';
  LANG_ORDER.forEach(code=>{
    const b=document.createElement('button');
    b.className='lang'+(code===lang?' active':''); b.textContent=LANG[code].flag;
    b.setAttribute('aria-pressed', code===lang?'true':'false');
    b.onclick=()=>{ if(code!==lang) setLang(code); };
    bar.appendChild(b);
  });
}
function setLang(code){
  lang=code; T=LANG[code];
  applyChrome(); buildLangBar();
  if(!started || finished) return;
  if(mode==="qa") return;                 // 문의 모드는 대화 그대로 유지
  if(data.anonIdx===0) data.contact=T.anonContact;
  rerender();
}

function botSay(content,isNode){
  const row=document.createElement('div'); row.className='row';
  row.innerHTML=BOT_AV+'<div class="bubble"></div>';
  if(isNode) row.querySelector('.bubble').appendChild(content);
  else row.querySelector('.bubble').textContent=content;
  chat.appendChild(row); scroll(); return row;
}
function userSay(text){
  const row=document.createElement('div'); row.className='row user';
  row.innerHTML=USER_AV+'<div class="bubble"></div>';
  row.querySelector('.bubble').textContent=text;
  chat.appendChild(row); scroll();
}
function options(list,cb){
  optsEl.innerHTML='';
  list.forEach((o,i)=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick=()=>{ optsEl.innerHTML=''; cb(o,i); };
    optsEl.appendChild(b);
  });
}
function setInput(on){
  textEl.disabled=!on; sendBtn.disabled=!on;
  textEl.placeholder=on?T.inputOn:T.inputOff;
  if(on) textEl.focus();
}
function scroll(){ setTimeout(()=>chat.scrollTop=chat.scrollHeight,30); }
function expect(cb,min){ pending=cb; minLen=min||1; }

/* typing indicator then run */
function withTyping(fn){
  if(REDUCE){ fn(); return; }
  const row=document.createElement('div'); row.className='row';
  row.innerHTML=BOT_AV+'<div class="bubble typing" aria-label="'+T.typingAria+'"><span></span><span></span><span></span></div>';
  chat.appendChild(row); scroll();
  setTimeout(()=>{ row.remove(); fn(); }, 520);
}

const flow=[
  ()=>{ botSay(T.greeting); setInput(false);
        options(T.anonOpts,(v,i)=>{ userSay(v); data.anonIdx=i; next(); }); },
  ()=>{ botSay(T.qCategory); setInput(false);
        options(T.categories,(v,i)=>{ userSay(v); data.categoryIdx=i; next(); }); },
  ()=>{ botSay(T.qWhen); setInput(true); expect(v=>{ data.when=v; next(); }); },
  ()=>{ botSay(T.qDept); setInput(true); expect(v=>{ data.dept=v; next(); }); },
  ()=>{ botSay(T.qWho); setInput(true); expect(v=>{ data.who=v; next(); }); },
  ()=>{ botSay(T.qDetail); setInput(true); expect(v=>{ data.detail=v; next(); },10); },
  ()=>{ botSay(T.qEvidence); setInput(false);
        options(T.evidenceOpts,(v,i)=>{ userSay(v); data.evidenceIdx=i; next(); }); },
  ()=>{ if(data.evidenceIdx===0){ attachStep(); } else { next(); } },
  ()=>{ if(data.anonIdx===1){ botSay(T.qName); setInput(true); expect(v=>{ data.name=v; next(); }); }
        else { next(); } },
  ()=>{ if(data.anonIdx===1){ botSay(T.qContact); setInput(true); expect(v=>{ data.contact=v; next(); }); }
        else { data.contact=T.anonContact; next(); } },
  ()=>{ showSummary(); }
];
function updateProgress(){
  const pct = finished ? 100 : Math.min(100, Math.round(step/(flow.length-1)*100));
  progressFill.style.width = pct + "%";
}
function runStep(){ stepHistory.push({step:step, chatLen:chat.children.length}); flow[step](); updateBack(); updateProgress(); }
function next(){ step++; withTyping(runStep); }
function updateBack(){ backBtn.style.display=(!finished && started && stepHistory.length>1)?'flex':'none'; }

function clearStepData(s){
  if(s===0)data.anonIdx=-1; else if(s===1)data.categoryIdx=-1; else if(s===2)data.when="";
  else if(s===3)data.dept=""; else if(s===4)data.who=""; else if(s===5)data.detail="";
  else if(s===6)data.evidenceIdx=-1; else if(s===7)data.files=[]; else if(s===8)data.name="";
  else if(s===9)data.contact="";
}
function goBack(){
  if(finished || stepHistory.length<2) return;
  pending=null;
  let cur=stepHistory.pop(), prev=null;
  while(stepHistory.length){
    const cand=stepHistory[stepHistory.length-1];
    if(cand.chatLen < cur.chatLen){ prev=stepHistory.pop(); break; }
    cur=stepHistory.pop();
  }
  if(!prev){ stepHistory.push(cur); return; }
  while(chat.children.length > prev.chatLen) chat.removeChild(chat.lastChild);
  optsEl.innerHTML=''; clearStepData(prev.step); step=prev.step; runStep();
}

function completedQA(s){
  if(s===0) return {q:T.greeting, a:T.anonOpts[data.anonIdx]};
  if(s===1) return {q:T.qCategory, a:T.categories[data.categoryIdx]};
  if(s===2) return {q:T.qWhen, a:data.when};
  if(s===3) return {q:T.qDept, a:data.dept};
  if(s===4) return {q:T.qWho, a:data.who};
  if(s===5) return {q:T.qDetail, a:data.detail};
  if(s===6) return {q:T.qEvidence, a:T.evidenceOpts[data.evidenceIdx]};
  if(s===7) return data.evidenceIdx===0 ? {q:T.qAttach, a:(data.files.length?data.files.map(f=>f.name).join(', '):T.attachNone)} : null;
  if(s===8) return data.anonIdx===1 ? {q:T.qName, a:data.name} : null;
  if(s===9) return data.anonIdx===1 ? {q:T.qContact, a:data.contact} : null;
  return null;
}
function rerender(){
  chat.innerHTML=''; optsEl.innerHTML=''; pending=null; stepHistory=[];
  for(let s=0; s<step; s++){
    stepHistory.push({step:s, chatLen:chat.children.length});
    const r=completedQA(s);
    if(r){ botSay(r.q); userSay(r.a); }
  }
  runStep();
}

/* ---- Attachments with chips ---- */
function fmtSize(b){ if(b<1024)return b+" B"; if(b<1048576)return (b/1024).toFixed(0)+" KB"; return (b/1048576).toFixed(1)+" MB"; }
function attachStep(){
  botSay(T.qAttach); setInput(false); optsEl.innerHTML='';
  const chips=document.createElement('div'); chips.className='chips'; chips.id='chips';
  const inp=document.createElement('input'); inp.type='file'; inp.multiple=true; inp.style.display='none';
  const pick=document.createElement('button'); pick.className='opt'; pick.textContent="📎 "+T.attachPick;
  pick.onclick=()=>inp.click();
  const done=document.createElement('button'); done.className='opt primary'; done.textContent=T.attachNext;
  done.onclick=()=>{ optsEl.innerHTML=''; next(); };
  inp.onchange=()=>readFiles(inp.files, chips);
  optsEl.appendChild(chips); optsEl.appendChild(pick); optsEl.appendChild(done); optsEl.appendChild(inp);
  renderChips(chips);
}
function renderChips(chips){
  chips.innerHTML='';
  data.files.forEach((f,idx)=>{
    const chip=document.createElement('span'); chip.className='chip';
    chip.innerHTML='<span class="nm"></span><span class="sz">'+fmtSize(f.size||0)+'</span>';
    chip.querySelector('.nm').textContent=f.name;
    const x=document.createElement('button'); x.className='x'; x.textContent='×';
    x.setAttribute('aria-label',T.removeAria+': '+f.name);
    x.onclick=()=>{ data.files.splice(idx,1); renderChips(chips); };
    chip.appendChild(x); chips.appendChild(chip);
  });
}
function readFiles(fileList, chips){
  Array.from(fileList).forEach(file=>{
    if(file.size > CONFIG.MAX_FILE_MB*1024*1024){ botSay(T.attachTooBig.replace('{n}',file.name)); return; }
    const reader=new FileReader();
    reader.onload=()=>{
      const b64=String(reader.result).split(',')[1];
      data.files.push({name:file.name, size:file.size, mimeType:file.type||'application/octet-stream', data:b64});
      renderChips(chips);
    };
    reader.readAsDataURL(file);
  });
}

sendBtn.onclick=submitText;
textEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submitText(); }});
textEl.addEventListener('input',()=>{ textEl.style.height='44px'; textEl.style.height=Math.min(textEl.scrollHeight,120)+'px'; });
function submitText(){
  const v=textEl.value.trim(); if(!pending) return;
  if(v.length<minLen){ textEl.style.borderColor='var(--warn)'; setTimeout(()=>textEl.style.borderColor='',400); return; }
  userSay(v); textEl.value=''; textEl.style.height='44px';
  const cb=pending; pending=null; setInput(false); cb(v);
}

function showSummary(){
  setInput(false);
  const box=document.createElement('div'); box.className='summary';
  const fileText = data.files.length ? data.files.map(f=>f.name).join(", ") : T.attachNone;
  const rows=[
    [T.L.anon, T.anonOpts[data.anonIdx]],
    [T.L.category, T.categories[data.categoryIdx]],
    [T.L.when, data.when],
    [T.L.dept, data.dept],
    [T.L.who, data.who],
    [T.L.evidence, T.evidenceOpts[data.evidenceIdx]],
    [T.L.files, fileText]
  ];
  if(data.anonIdx===1) rows.push([T.L.name, data.name]);
  rows.push([T.L.contact, data.contact]);
  rows.push([T.L.detail, data.detail]);
  box.innerHTML='<h4>'+esc(T.sumTitle)+'</h4><table>'+
    rows.map(r=>'<tr><td class="k">'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>').join('')+'</table>';
  botSay(box,true);
  botSay(T.qConfirm);
  options(T.confirmOpts,(v,i)=>{ userSay(v); if(i===1){ setLang(lang); } else deliver(); });
}

function buildBody(){
  const K=LANG.ko, ref="ETH-"+Date.now().toString().slice(-8);
  const body=
"■ 윤리·감사 제보 접수\n"+
"접수번호: "+ref+"\n"+
"접수일시: "+new Date().toLocaleString('ko-KR')+"\n"+
"작성언어: "+T.name+"\n\n"+
"[제보 방식] "+K.anonOpts[data.anonIdx]+"\n"+
"[제보 유형] "+K.categories[data.categoryIdx]+"\n"+
"[발생 시기] "+data.when+"\n"+
"[부서/장소] "+data.dept+"\n"+
"[관련 인물] "+data.who+"\n"+
"[증빙 자료] "+K.evidenceOpts[data.evidenceIdx]+"\n"+
"[첨부파일] "+(data.files.length? data.files.map(f=>f.name).join(", ") : "없음")+"\n"+
"[성    명] "+(data.anonIdx===1? data.name : "(익명)")+"\n"+
"[연 락 처] "+data.contact+"\n\n"+
"[상세 내용]\n"+data.detail+"\n";
  const fields={
    ref:ref, channel:"챗봇",
    anon:K.anonOpts[data.anonIdx], category:K.categories[data.categoryIdx],
    when:data.when, dept:data.dept, who:data.who,
    name:(data.anonIdx===1? data.name : "(익명)"), contact:data.contact,
    evidence:K.evidenceOpts[data.evidenceIdx],
    files:(data.files.length? data.files.map(f=>f.name).join(", ") : "없음"),
    detail:data.detail, lang:T.name
  };
  return { ref, subject:"[윤리제보 "+ref+"] "+K.categories[data.categoryIdx], body, fields };
}

function deliver(){
  finished=true; updateBack(); updateProgress();
  const msg=buildBody(), cfg=CONFIG.EMAILJS;
  if(CONFIG.APPSCRIPT_ENDPOINT) sendViaAppsScript(msg);
  else if(CONFIG.FORMSPREE_ENDPOINT) sendViaFormspree(msg);
  else if(cfg.PUBLIC_KEY&&cfg.SERVICE_ID&&cfg.TEMPLATE_ID) sendViaEmailJS(msg);
  else {
    window.location.href="mailto:"+CONFIG.RECIPIENT_EMAIL+"?subject="+encodeURIComponent(msg.subject)+"&body="+encodeURIComponent(msg.body);
    doneMessage(msg.ref,T.mailtoExtra);
  }
}
function sendingBubble(txt){
  const node=document.createElement('span'); node.className='sending';
  node.innerHTML='<span class="spinner" aria-hidden="true"></span>';
  const t=document.createElement('span'); t.textContent=txt||T.sending; node.appendChild(t);
  return botSay(node,true);
}
function failRetry(text){
  botSay(text);
  options([T.retry],()=>{ deliver(); });
}
function sendViaAppsScript(msg){
  const s=sendingBubble();
  fetch(CONFIG.APPSCRIPT_ENDPOINT,{
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({ subject:msg.subject, body:msg.body, files:data.files, fields:msg.fields })
  }).then(()=>{ if(s)s.remove(); doneMessage(msg.ref,T.success); })
    .catch(()=>{ if(s)s.remove(); failRetry(T.errNet); });
}
function sendViaFormspree(msg){
  const s=sendingBubble();
  fetch(CONFIG.FORMSPREE_ENDPOINT,{
    method:"POST", headers:{"Content-Type":"application/json","Accept":"application/json"},
    body:JSON.stringify({ _subject:msg.subject, ref:msg.ref, report:msg.body })
  }).then(r=>{ if(s)s.remove(); if(r.ok) doneMessage(msg.ref,T.success); else failRetry(T.errHttp.replace('{s}',r.status)); })
    .catch(()=>{ if(s)s.remove(); failRetry(T.errNet); });
}
function sendViaEmailJS(msg){
  const s=sendingBubble();
  const sc=document.createElement('script');
  sc.src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
  sc.onload=()=>{ emailjs.init({publicKey:CONFIG.EMAILJS.PUBLIC_KEY});
    emailjs.send(CONFIG.EMAILJS.SERVICE_ID,CONFIG.EMAILJS.TEMPLATE_ID,{
      subject:msg.subject, body:msg.body, reply_to:(data.contact.indexOf("@")>=0?data.contact:CONFIG.RECIPIENT_EMAIL)
    }).then(()=>{ if(s)s.remove(); doneMessage(msg.ref,T.success); })
      .catch(err=>{ if(s)s.remove(); failRetry(T.errHttp.replace('{s}',(err&&err.text)||'')); });
  };
  sc.onerror=()=>{ if(s)s.remove(); failRetry(T.errNet); };
  document.body.appendChild(sc);
}
function doneMessage(ref,extra){ botSay(T.doneTpl.replace('{ref}',ref).replace('{extra}',extra)); }
function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

function startChat(){
  if(started) return; started=true; mode="report";
  introEl.style.display='none';
  withTyping(runStep);
}

/* ---- 문의(Q&A) 모드 ---- */
function startQA(){
  if(started) return; started=true; mode="qa";
  introEl.style.display='none';
  progressFill.style.width="0%";
  withTyping(function(){ botSay(T.qaGreeting); qaReady(); });
}
function qaReady(){
  setInput(true); expect(qaAsk, 2);
  options([T.qaToReport], function(){ switchToReport(); });
}
function qaAsk(q){
  const s=sendingBubble(T.qaThinking);
  fetch(CONFIG.APPSCRIPT_ENDPOINT, {
    method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({ action:"qa", question:q, lang:T.name })
  }).then(function(r){ return r.json(); })
    .then(function(d){ if(s)s.remove(); botSay((d&&d.answer)?d.answer:T.qaError); qaReady(); })
    .catch(function(){ if(s)s.remove(); botSay(T.qaError); qaReady(); });
}
function resetData(){
  data.anonIdx=-1; data.categoryIdx=-1; data.evidenceIdx=-1;
  data.when=""; data.dept=""; data.who=""; data.detail=""; data.name=""; data.contact=""; data.files=[];
}
function switchToReport(){
  mode="report"; finished=false; step=0; pending=null; stepHistory=[];
  chat.innerHTML=''; optsEl.innerHTML=''; resetData();
  withTyping(runStep);
}

startBtn.onclick=startChat;
askBtn.onclick=startQA;
backBtn.onclick=goBack;
applyChrome(); buildLangBar(); updateProgress();
</script>
</body>
</html>
